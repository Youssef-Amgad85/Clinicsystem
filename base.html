<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ClinicOS{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --navy:   #0f1f3d;
      --teal:   #0d9488;
      --teal-lt:#ccfbf1;
      --slate:  #64748b;
      --bg:     #f8fafc;
      --card:   #ffffff;
      --border: #e2e8f0;
      --text:   #1e293b;
      --muted:  #94a3b8;
      --danger: #ef4444;
      --success:#16a34a;
      --warn:   #d97706;
      --sidebar-w: 240px;
    }

    /* ── Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      padding: 0;
    }
    .sidebar-brand {
      padding: 28px 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand .brand-icon {
      width: 36px; height: 36px;
      background: var(--teal);
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .sidebar-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: #fff;
      margin: 0;
      letter-spacing: -.2px;
    }
    .sidebar-brand p {
      font-size: .72rem;
      color: var(--muted);
      margin: 2px 0 0;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .sidebar-nav {
      flex: 1;
      padding: 20px 12px;
    }
    .nav-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      padding: 12px 12px 6px;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: .875rem;
      font-weight: 400;
      transition: all .15s;
      margin-bottom: 2px;
    }
    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: rgba(13,148,136,.18);
      color: #fff;
    }
    .sidebar-nav a.active { font-weight: 500; }
    .sidebar-nav a i { font-size: 1rem; opacity: .85; }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── Main content ───────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      margin: 0;
      color: var(--navy);
    }
    .topbar .badge-clinic {
      background: var(--teal-lt);
      color: var(--teal);
      font-size: .72rem;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 500;
    }
    .page-body {
      padding: 32px;
      flex: 1;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .card-header-custom {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header-custom h5 {
      margin: 0;
      font-weight: 600;
      font-size: .95rem;
      display: flex; align-items: center; gap: 8px;
    }
    .card-header-custom h5 i { color: var(--teal); }

    /* ── Stat cards ─────────────────────────────────────────── */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .stat-icon {
      width: 50px; height: 50px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .stat-card .label { font-size: .78rem; color: var(--muted); font-weight: 500; }
    .stat-card .value { font-size: 1.7rem; font-weight: 600; line-height: 1.1; color: var(--navy); }

    /* ── Tables ─────────────────────────────────────────────── */
    .clinic-table { width: 100%; border-collapse: collapse; }
    .clinic-table thead th {
      background: #f1f5f9;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--slate);
      font-weight: 600;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .clinic-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .clinic-table tbody tr:last-child { border-bottom: none; }
    .clinic-table tbody tr:hover { background: #f8fafc; }
    .clinic-table td {
      padding: 12px 16px;
      font-size: .875rem;
      vertical-align: middle;
    }
    .clinic-table td .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--teal-lt);
      color: var(--teal);
      font-size: .75rem;
      font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      margin-right: 8px;
    }

    /* ── Status badges ──────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .status-badge.scheduled  { background: #dbeafe; color: #1d4ed8; }
    .status-badge.in-progress{ background: #dcfce7; color: #15803d; }
    .status-badge.postponed  { background: #fef9c3; color: #a16207; }
    .status-badge.none       { background: #f1f5f9; color: var(--muted); }

    /* ── Alerts ─────────────────────────────────────────────── */
    .alert-custom {
      border-radius: 10px;
      padding: 14px 18px;
      font-size: .875rem;
      display: flex; align-items: flex-start; gap: 10px;
      border: none;
      margin-bottom: 24px;
    }
    .alert-custom.danger  { background: #fef2f2; color: #991b1b; }
    .alert-custom.success { background: #f0fdf4; color: #166534; }
    .alert-custom i { font-size: 1rem; margin-top: 1px; }

    /* ── Forms ──────────────────────────────────────────────── */
    .form-label { font-size: .8rem; font-weight: 500; color: var(--slate); margin-bottom: 4px; }
    .form-control, .form-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .875rem;
      padding: 9px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
      outline: none;
    }
    .btn-teal {
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-teal:hover { opacity: .88; color: #fff; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: .8rem;
      font-weight: 500;
      color: var(--slate);
      cursor: pointer;
      transition: all .15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-ghost:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-lt); }

    /* ── Inline status form ─────────────────────────────────── */
    .status-form { display: flex; align-items: center; gap: 6px; }
    .status-form select {
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .78rem;
      padding: 5px 8px;
      background: #fff;
    }
    .btn-xs {
      padding: 5px 10px; font-size: .75rem; border-radius: 6px;
      background: var(--teal); color: #fff; border: none; cursor: pointer;
      font-weight: 500; transition: opacity .15s;
    }
    .btn-xs:hover { opacity: .82; }

    /* ── Misc ───────────────────────────────────────────────── */
    .section-divider {
      height: 1px; background: var(--border); margin: 28px 0;
    }
    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--muted);
    }
    .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <i class="bi bi-hospital text-white fs-5"></i>
    </div>
    <h1>ClinicOS</h1>
    <p>Management System</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Navigation</div>
    <a href="{{ url_for('dashboard') }}"    class="{{ 'active' if request.endpoint == 'dashboard'    }}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="{{ url_for('doctors') }}"      class="{{ 'active' if request.endpoint == 'doctors'      }}"><i class="bi bi-person-badge"></i> Doctor Directory</a>
    <a href="{{ url_for('patients') }}"     class="{{ 'active' if request.endpoint == 'patients'     }}"><i class="bi bi-people"></i> Patient Records</a>
    <a href="{{ url_for('appointments') }}" class="{{ 'active' if request.endpoint == 'appointments' }}"><i class="bi bi-calendar3"></i> Appointments</a>
  </nav>
  <div class="sidebar-footer">
    &copy; {{ 2025 }} ClinicOS &mdash; All rights reserved
  </div>
</aside>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div id="main">
  <header class="topbar">
    <h2>{% block page_title %}Dashboard{% endblock %}</h2>
    <span class="badge-clinic"><i class="bi bi-circle-fill me-1" style="font-size:.5rem;color:var(--teal)"></i>System Online</span>
  </header>

  <div class="page-body">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
